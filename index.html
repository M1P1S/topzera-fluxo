<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Topzera">
<meta name="theme-color" content="#0f0f0f">
<title>Topzera — Fluxo de Caixa</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --green: #4ade80;
    --green2: #166534;
    --green-bg: rgba(74,222,128,0.08);
    --red: #f87171;
    --red2: #7f1d1d;
    --red-bg: rgba(248,113,113,0.08);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.08);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.08);
    --accent: #4ade80;
    --r: 10px;
    --rsm: 6px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(70px + var(--safe-bottom));
    overscroll-behavior: none;
  }

  /* HEADER */
  .header {
    background: var(--bg);
    padding: 16px 16px 8px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .sync-badge {
    font-size: 10px; padding: 3px 8px; border-radius: 20px;
    display: flex; align-items: center; gap: 4px;
  }
  .sync-ok { background: var(--green-bg); color: var(--green); }
  .sync-err { background: var(--red-bg); color: var(--red); }
  .sync-load { background: var(--yellow-bg); color: var(--yellow); }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 200;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0; background: none; border: none; cursor: pointer;
    color: var(--text3); font-family: 'DM Mono', monospace;
    font-size: 9px; gap: 4px; transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* CONTENT */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px;
  }
  .card.green { border-color: var(--green2); background: var(--green-bg); }
  .card.red { border-color: var(--red2); background: var(--red-bg); }
  .card.yellow { border-color: #854d0e; background: var(--yellow-bg); }
  .card.blue { border-color: #1e40af; background: var(--blue-bg); }
  .card.full { grid-column: 1/-1; }
  .card-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
  .card-sub { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* SECTION TITLE */
  .sec { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 10px; }

  /* PROGRESS */
  .prog-wrap { margin-bottom: 14px; }
  .prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 5px; }
  .prog-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  /* ALERT */
  .alert { padding: 10px 14px; border-radius: var(--rsm); font-size: 12px; margin-bottom: 8px; border-left: 3px solid; line-height: 1.5; }
  .alert-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .alert-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .alert-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }

  /* FORM */
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .field label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--rsm); padding: 12px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px;
    outline: none; width: 100%;
    -webkit-appearance: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }

  .btn {
    width: 100%; padding: 14px; border-radius: var(--rsm);
    border: none; cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:active { background: #86efac; }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-sm { padding: 6px 12px; font-size: 11px; width: auto; border-radius: 5px; }
  .btn-danger-sm { background: var(--red-bg); color: var(--red); border: 1px solid var(--red2); }

  /* LISTA */
  .list-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px 14px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .list-item-info { display: flex; flex-direction: column; gap: 3px; }
  .list-item-title { font-size: 13px; color: var(--text); }
  .list-item-sub { font-size: 11px; color: var(--text3); }
  .list-item-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }

  /* DESPESAS */
  .desp-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .desp-item:last-child { border-bottom: none; }
  .desp-left { display: flex; flex-direction: column; gap: 3px; flex: 1; margin-right: 10px; }
  .desp-name { font-size: 12px; color: var(--text); }
  .desp-info { font-size: 10px; color: var(--text3); }
  .desp-right { display: flex; align-items: center; gap: 10px; }
  .desp-val { font-size: 13px; font-weight: 500; }
  .check-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border2); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: transparent; flex-shrink: 0;
    transition: all 0.2s;
  }
  .check-btn.pago { background: var(--green); border-color: var(--green); color: #000; }

  /* SEMANA */
  .week-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); margin-bottom: 12px; overflow: hidden;
  }
  .week-head {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .week-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .week-period { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .week-body { padding: 0 14px; }
  .week-foot {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--border); background: var(--bg3);
  }
  .wf-item { padding: 10px; text-align: center; }
  .wf-label { font-size: 9px; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
  .wf-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  /* BADGE */
  .badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }

  /* ENVELOPES */
  .env-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 10px; }
  .env-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .env-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .env-dia { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .env-vals { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }

  /* LOADING */
  .loading { text-align: center; padding: 30px; color: var(--text3); font-size: 12px; }
  .empty { text-align: center; padding: 30px; color: var(--text3); font-size: 12px; border: 1px dashed var(--border); border-radius: var(--r); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 300; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border-radius: 20px 20px 0 0;
    padding: 20px 16px calc(20px + var(--safe-bottom));
    width: 100%; transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid var(--border);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  .msg { font-size: 12px; padding: 8px 0; min-height: 20px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>📦 Topzera</h1>
    <div class="sync-badge sync-load" id="syncBadge">⏳ Conectando...</div>
  </div>
  <div class="header-sub" id="headerSub">Fluxo de Caixa · Junho 2026</div>
</div>

<!-- PÁGINAS -->
<div class="page active" id="page-dashboard"></div>
<div class="page" id="page-lancar"></div>
<div class="page" id="page-semanas"></div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">
    <span class="icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" onclick="showPage('lancar',this)">
    <span class="icon">➕</span>Lançar
  </button>
  <button class="nav-btn" onclick="showPage('semanas',this)">
    <span class="icon">📅</span>Semanas
  </button>

<div class="modal-overlay" id="modalDelete">

</div>

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
const SUPABASE_URL = 'https://lwoecfvkxnabwrllithp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3b2VjZnZreG5hYndybGxpdGhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjY2NTksImV4cCI6MjA5NTkwMjY1OX0.OEZBzcLaPcqlEwdoZfIRxm7XAWRMlavrTUawNyGgbQ8';
const MES_ANO = '2026-06';

async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers||{})
    }
  });
  if(!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ============================================================
// DADOS FIXOS
// ============================================================
const DESPESAS = [
  { dia:1,  desc:'Plano de Saúde Família',        val:923.60,  cat:'Loja',    sem:1 },
  { dia:1,  desc:'Energia Loja',                  val:140.00,  cat:'Loja',    sem:1 },
  { dia:7,  desc:'Cartão MP — Máquina 3/12',      val:160.20,  cat:'Loja',    sem:1 },
  { dia:7,  desc:'Cartão MP — Máquina parc.',     val:124.74,  cat:'Loja',    sem:1 },
  { dia:7,  desc:'Cartão MP — Acessório Carro',   val:16.70,   cat:'Loja',    sem:1 },
  { dia:7,  desc:'Cartão MP — Impressora',        val:67.84,   cat:'Loja',    sem:1 },
  { dia:9,  desc:'Aluguel Topzera',               val:1621.00, cat:'Loja',    sem:2 },
  { dia:9,  desc:'Internet Loja',                 val:109.90,  cat:'Loja',    sem:2 },
  { dia:9,  desc:'Internet Pessoal',              val:100.00,  cat:'Pessoal', sem:2 },
  { dia:10, desc:'DAS CNPJ',                      val:87.05,   cat:'Loja',    sem:2 },
  { dia:10, desc:'Água Pessoal',                  val:100.00,  cat:'Pessoal', sem:2 },
  { dia:10, desc:'Cabelo',                        val:66.00,   cat:'Pessoal', sem:2 },
  { dia:10, desc:'Dízimo',                        val:200.00,  cat:'Pessoal', sem:2 },
  { dia:10, desc:'Energia Pessoal',               val:140.00,  cat:'Pessoal', sem:2 },
  { dia:10, desc:'Investimento Pessoal',          val:60.00,   cat:'Pessoal', sem:2 },
  { dia:10, desc:'Oferta',                        val:50.00,   cat:'Pessoal', sem:2 },
  { dia:10, desc:'Pacto Desb.',                   val:30.00,   cat:'Pessoal', sem:2 },
  { dia:10, desc:'Transporte B',                  val:220.00,  cat:'Pessoal', sem:2 },
  { dia:15, desc:'Contabilidade MPS',             val:300.00,  cat:'Loja',    sem:3 },
  { dia:15, desc:'Folha CNPJ MPS',               val:184.06,  cat:'Loja',    sem:3 },
  { dia:20, desc:'Cartão Nubank Loja',            val:118.54,  cat:'Loja',    sem:3 },
  { dia:25, desc:'Água Loja',                     val:136.23,  cat:'Loja',    sem:4 },
  { dia:25, desc:'Celular Loja',                  val:385.00,  cat:'Loja',    sem:4 },
  { dia:25, desc:'Sistema Loja',                  val:169.00,  cat:'Loja',    sem:4 },
  { dia:25, desc:'Cartão Nubank Pessoal',         val:595.10,  cat:'Pessoal', sem:4 },
];

const SEMANAS = [
  { num:1, label:'Semana 1', periodo:'01 a 07/jun', dias:[1,2,3,4,5,6,7] },
  { num:2, label:'Semana 2', periodo:'08 a 14/jun', dias:[8,9,10,11,12,13,14] },
  { num:3, label:'Semana 3', periodo:'15 a 21/jun', dias:[15,16,17,18,19,20,21] },
  { num:4, label:'Semana 4', periodo:'22 a 30/jun', dias:[22,23,24,25,26,27,28,29,30] },
];

const META_MES = 9500;
const REINVEST = 0.35;
const SALDO_INI = 1790.15;
const TOTAL_DESP = 6104.96;

// ============================================================
// STATE
// ============================================================
let lancamentos = [];
let pagamentos = {};
let deleteId = null;
let connected = false;

// ============================================================
// UTILS
// ============================================================
function fmt(v) { return 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function fmtS(v) { return (v>=0?'R$ ':'–R$ ') + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function hoje() { return new Date().toISOString().split('T')[0]; }
function diaNum(data) { return parseInt(data.split('-')[2]); }
function setSyncBadge(status) {
  const b = document.getElementById('syncBadge');
  b.className = 'sync-badge';
  if(status==='ok') { b.className += ' sync-ok'; b.textContent = '✓ Sincronizado'; connected=true; }
  else if(status==='err') { b.className += ' sync-err'; b.textContent = '✗ Offline'; connected=false; }
  else { b.className += ' sync-load'; b.textContent = '⏳ Sincronizando...'; }
}

// ============================================================
// SUPABASE — CRUD
// ============================================================
async function carregarDados() {
  setSyncBadge('load');
  try {
    const [lancs, pags] = await Promise.all([
      sbFetch(`lancamentos?mes_ano=eq.${MES_ANO}&order=data.asc`, {
        headers: { 'Range': '0-999' }
      }).catch(() => sbFetch(`lancamentos?order=data.asc`)),
      sbFetch(`pagamentos?mes_ano=eq.${MES_ANO}`)
    ]);
    lancamentos = lancs || [];
    pagamentos = {};
    (pags||[]).forEach(p => { pagamentos[`${p.dia}-${p.descricao}`] = p.pago; });
    setSyncBadge('ok');
  } catch(e) {
    console.error(e);
    setSyncBadge('err');
    // fallback localStorage
    lancamentos = JSON.parse(localStorage.getItem('tz_lanc')||'[]');
    const pLocal = JSON.parse(localStorage.getItem('tz_pag')||'{}');
    pagamentos = pLocal;
  }
  renderAll();
}

async function salvarLancamento(lanc) {
  setSyncBadge('load');
  try {
    // Upsert por data
    await sbFetch(`lancamentos`, {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ ...lanc, mes_ano: MES_ANO })
    });
    setSyncBadge('ok');
    return true;
  } catch(e) {
    console.error(e);
    setSyncBadge('err');
    return false;
  }
}

async function deletarLancamento(id) {
  setSyncBadge('load');
  try {
    await sbFetch(`lancamentos?id=eq.${id}`, { method: 'DELETE' });
    setSyncBadge('ok');
    return true;
  } catch(e) {
    setSyncBadge('err');
    return false;
  }
}

async function salvarPagamento(dia, desc, pago) {
  setSyncBadge('load');
  try {
    await sbFetch(`pagamentos`, {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ dia, descricao: desc, mes_ano: MES_ANO, pago, pago_em: pago ? new Date().toISOString() : null })
    });
    setSyncBadge('ok');
  } catch(e) {
    setSyncBadge('err');
  }
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  renderPage(id);
}

function renderAll() {
  const active = document.querySelector('.page.active');
  if(active) renderPage(active.id.replace('page-',''));
}

function renderPage(id) {
  if(id==='dashboard') renderDashboard();
  else if(id==='lancar') renderLancar();
  else if(id==='semanas') renderSemanas();
  else if(id==='envelopes') renderEnvelopes();
}

// ============================================================
// CALCULOS
// ============================================================
function calcTotais() {
  const totalFat = lancamentos.reduce((a,l)=>a+(+l.dinheiro||0)+(+l.pix||0)+(+l.credito||0),0);
  const totalReinvest = totalFat * REINVEST;
  const totalLiquido = totalFat - totalReinvest;
  const totalDespPagas = DESPESAS.filter(d=>pagamentos[`${d.dia}-${d.desc}`]).reduce((a,d)=>a+d.val,0);
  const saldoAtual = SALDO_INI + totalLiquido - totalDespPagas;
  return { totalFat, totalReinvest, totalLiquido, totalDespPagas, saldoAtual };
}

function fatHoje() {
  const l = lancamentos.find(x=>x.data===hoje());
  if(!l) return 0;
  return (+l.dinheiro||0)+(+l.pix||0)+(+l.credito||0);
}

function fatSemana(num) {
  const sem = SEMANAS.find(s=>s.num===num);
  return lancamentos.filter(l=>sem.dias.includes(diaNum(l.data))).reduce((a,l)=>a+(+l.dinheiro||0)+(+l.pix||0)+(+l.credito||0),0);
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const t = calcTotais();
  const fh = fatHoje();
  const diaAtual = parseInt(hoje().split('-')[2]);

  const pctMes = Math.min((t.totalFat/META_MES)*100,100);

      ? '<div class="empty">Nenhum lançamento ainda.</div>'

          const fat = (+l.dinheiro||0)+(+l.pix||0)+(+l.credito||0);
          const reinv = fat*REINVEST;
          const liq = fat-reinv;
          const d = new Date(l.data+'T12:00:00');
          const label = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
          return `<div class="list-item">
            <div class="list-item-info">
              <div class="list-item-title">${label}</div>
              <div class="list-item-sub">💵${fmt(+l.dinheiro||0)} · 📱${fmt(+l.pix||0)} · 💳${fmt(+l.credito||0)}</div>
              <div class="list-item-sub" style="color:var(--yellow);">Reinvest: ${fmt(reinv)}</div>
            </div>
            <div style="text-align:right;">
              <div class="list-item-val" style="color:var(--green);">${fmt(fat)}</div>
              <div style="font-size:11px;color:var(--blue);">Líq: ${fmt(liq)}</div>
              <button class="btn btn-sm btn-danger-sm" style="margin-top:6px;" onclick="abrirDelete('${l.id}','${label}')">✕</button>
            </div>
          </div>`;
        }).join('')
    }
  `;
}

async function lancar() {
  const data = document.getElementById('inputData').value || hoje();
  const dinheiro = parseFloat(document.getElementById('inputDin').value)||0;
  const pix = parseFloat(document.getElementById('inputPix').value)||0;
  const credito = parseFloat(document.getElementById('inputCred').value)||0;

  if(dinheiro+pix+credito <= 0) {
    showMsg('lancMsg','⚠️ Informe pelo menos um valor.','red'); return;
  }

  // Verificar se já existe lançamento nessa data (atualizar)
  const existente = lancamentos.find(l=>l.data===data);
  let lancamento;
  if(existente) {
    lancamento = {
      id: existente.id,
      data,
      dinheiro: (existente.dinheiro||0)+dinheiro,
      pix: (existente.pix||0)+pix,
      credito: (existente.credito||0)+credito,
      mes_ano: MES_ANO
    };
  } else {
    lancamento = { data, dinheiro, pix, credito, mes_ano: MES_ANO };
  }

  showMsg('lancMsg','⏳ Salvando...','yellow');
  const ok = await salvarLancamento(lancamento);

  if(ok) {
    showMsg('lancMsg','✓ Lançamento salvo na nuvem!','green');
    await carregarDados();
    document.getElementById('inputDin').value='';
    document.getElementById('inputPix').value='';
    document.getElementById('inputCred').value='';
  } else {
    // Salvar local como fallback
    if(existente) {
      existente.dinheiro = lancamento.dinheiro;
      existente.pix = lancamento.pix;
      existente.credito = lancamento.credito;
    } else {
      lancamentos.push({...lancamento, id: Date.now().toString()});
    }
    localStorage.setItem('tz_lanc', JSON.stringify(lancamentos));
    showMsg('lancMsg','⚠️ Salvo localmente (sem internet)','yellow');
    renderAll();
  }
}

function showMsg(id, txt, cor) {
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = txt;
  el.style.color = cor==='green'?'var(--green)':cor==='yellow'?'var(--yellow)':'var(--red)';
  if(cor==='green') setTimeout(()=>{ if(el) el.textContent=''; },3000);
}

function abrirDelete(id, label) {
  deleteId = id;
  document.getElementById('modalDeleteMsg').textContent = `Excluir lançamento de ${label}?`;
  document.getElementById('modalDelete').classList.add('open');
}

async function confirmarDelete() {
  if(!deleteId) return;
  fecharModal('modalDelete');
  const ok = await deletarLancamento(deleteId);
  if(ok) {
    lancamentos = lancamentos.filter(l=>l.id!==deleteId);
  } else {
    lancamentos = lancamentos.filter(l=>l.id!==deleteId);
    localStorage.setItem('tz_lanc', JSON.stringify(lancamentos));
  }
  deleteId = null;
  renderAll();
}

function fecharModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ============================================================
// SEMANAS
// ============================================================
function renderSemanas() {
  let saldoAcum = SALDO_INI;
  let html = '';

  SEMANAS.forEach(sem => {
    const fatSem = fatSemana(sem.num);
    const reinvSem = fatSem * REINVEST;
    const liqSem = fatSem - reinvSem;
    const despSem = DESPESAS.filter(d=>d.sem===sem.num);
    const totalDespSem = despSem.reduce((a,d)=>a+d.val,0);
    const saldoSem = liqSem - totalDespSem;
    saldoAcum += saldoSem;
    const metaSem = META_MES / 4;
    const pct = Math.min((fatSem/metaSem)*100,100);
    const corPct = pct>=100?'#4ade80':pct>=60?'#fbbf24':'#f87171';

    html += `<div class="week-card">
      <div class="week-head">
        <div>
          <div class="week-title">${sem.label}</div>
          <div class="week-period">${sem.periodo} · Meta: ${fmt(metaSem)}</div>
        </div>
        <span class="badge ${saldoSem>=0?'badge-green':'badge-red'}">${fmtS(saldoSem)}</span>
      </div>
      <div style="padding:12px 14px 0;">
        <div class="prog-wrap">
          <div class="prog-row"><span>Faturado: ${fmt(fatSem)}</span><span>${Math.round(pct)}%</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${corPct};"></div></div>
        </div>
      </div>
      <div class="week-body">
        ${despSem.map(d=>{
          const key = `${d.dia}-${d.desc}`;
          const pago = pagamentos[key]||false;
          return `<div class="desp-item">
            <div class="desp-left">
              <div class="desp-name" style="${pago?'text-decoration:line-through;color:var(--text3);':''}">${d.desc}</div>
              <div class="desp-info">Dia ${d.dia} · <span class="badge ${d.cat==='Loja'?'badge-blue':'badge-yellow'}">${d.cat}</span></div>
            </div>
            <div class="desp-right">
              <span class="desp-val" style="color:${pago?'var(--text3)':'var(--red)'};">${fmt(d.val)}</span>
              <button class="check-btn ${pago?'pago':''}" onclick="togglePago(${d.dia},'${d.desc.replace(/'/g,"\\'")}')">✓</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="week-foot">
        <div class="wf-item">
          <div class="wf-label">Faturado</div>
          <div class="wf-val" style="color:var(--green);">${fmt(fatSem)}</div>
        </div>
        <div class="wf-item">
          <div class="wf-label">Despesas</div>
          <div class="wf-val" style="color:var(--red);">${fmt(totalDespSem)}</div>
        </div>
        <div class="wf-item">
          <div class="wf-label">Acumulado</div>
          <div class="wf-val" style="color:${saldoAcum>=0?'var(--green)':'var(--red)'};">${fmtS(saldoAcum)}</div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('page-semanas').innerHTML = html;
}

async function togglePago(dia, desc) {
  const key = `${dia}-${desc}`;
  const novoVal = !pagamentos[key];
  pagamentos[key] = novoVal;
  localStorage.setItem('tz_pag', JSON.stringify(pagamentos));
  await salvarPagamento(dia, desc, novoVal);
  renderAll();
}
