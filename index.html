<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Topzera — Fluxo de Caixa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
  :root {
    --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;
    --border:#2a2a2a;--border2:#333;
    --text:#f0f0f0;--text2:#999;--text3:#555;
    --green:#4ade80;--green2:#166534;--green-bg:rgba(74,222,128,0.08);
    --red:#f87171;--red2:#7f1d1d;--red-bg:rgba(248,113,113,0.08);
    --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,0.08);
    --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);
    --accent:#4ade80;--r:10px;--rsm:6px;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(70px + var(--safe-bottom));overscroll-behavior:none;}
  .header{background:var(--bg);padding:16px 16px 8px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
  .header-top{display:flex;justify-content:space-between;align-items:center;}
  .header h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
  .sync-badge{font-size:10px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;}
  .sync-ok{background:var(--green-bg);color:var(--green);}
  .sync-err{background:var(--red-bg);color:var(--red);}
  .sync-load{background:var(--yellow-bg);color:var(--yellow);}
  .header-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:200;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'DM Mono',monospace;font-size:9px;gap:4px;transition:color 0.2s;}
  .nav-btn .icon{font-size:20px;}
  .nav-btn.active{color:var(--accent);}
  .page{display:none;padding:16px;}
  .page.active{display:block;}
  .card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
  .card.green{border-color:var(--green2);background:var(--green-bg);}
  .card.red{border-color:var(--red2);background:var(--red-bg);}
  .card.yellow{border-color:#854d0e;background:var(--yellow-bg);}
  .card.blue{border-color:#1e40af;background:var(--blue-bg);}
  .card.full{grid-column:1/-1;}
  .card-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
  .card-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1;}
  .card-sub{font-size:10px;color:var(--text3);margin-top:4px;}
  .sec{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin:16px 0 10px;display:flex;justify-content:space-between;align-items:center;}
  .prog-wrap{margin-bottom:14px;}
  .prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;}
  .prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:3px;transition:width 0.4s;}
  .alert{padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:8px;border-left:3px solid;line-height:1.5;}
  .alert-red{background:var(--red-bg);color:var(--red);border-color:var(--red);}
  .alert-yellow{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow);}
  .alert-green{background:var(--green-bg);color:var(--green);border-color:var(--green);}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
  .field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
  .field input,.field select{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rsm);padding:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none;width:100%;-webkit-appearance:none;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field input::placeholder{color:var(--text3);}
  .field select option{background:var(--bg2);}
  .btn{width:100%;padding:14px;border-radius:var(--rsm);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:active{background:#86efac;}
  .btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2);}
  .btn-sm{padding:6px 12px;font-size:11px;width:auto;border-radius:5px;}
  .btn-danger-sm{background:var(--red-bg);color:var(--red);border:1px solid var(--red2);}
  .btn-yellow-sm{background:var(--yellow-bg);color:var(--yellow);border:1px solid #854d0e;}
  .btn-green-sm{background:var(--green-bg);color:var(--green);border:1px solid var(--green2);}
  .list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  .list-item-info{display:flex;flex-direction:column;gap:3px;flex:1;margin-right:8px;}
  .list-item-title{font-size:13px;color:var(--text);}
  .list-item-sub{font-size:11px;color:var(--text3);}
  .list-item-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .desp-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .desp-item:last-child{border-bottom:none;}
  .desp-left{display:flex;flex-direction:column;gap:3px;flex:1;margin-right:10px;}
  .desp-name{font-size:12px;color:var(--text);}
  .desp-info{font-size:10px;color:var(--text3);}
  .desp-right{display:flex;align-items:center;gap:8px;}
  .desp-val{font-size:13px;font-weight:500;}
  .check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;flex-shrink:0;transition:all 0.2s;}
  .check-btn.pago{background:var(--green);border-color:var(--green);color:#000;}
  .week-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
  .week-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .week-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
  .week-period{font-size:10px;color:var(--text3);margin-top:2px;}
  .week-body{padding:0 14px;}
  .week-foot{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border);background:var(--bg3);}
  .wf-item{padding:10px;text-align:center;}
  .wf-label{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
  .wf-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
  .badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-red{background:var(--red-bg);color:var(--red);}
  .badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
  .badge-blue{background:var(--blue-bg);color:var(--blue);}
  .badge-purple{background:rgba(167,139,250,0.1);color:#a78bfa;}
  .env-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
  .env-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .env-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
  .env-dia{font-size:10px;color:var(--text3);margin-top:2px;}
  .env-vals{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
  .loading{text-align:center;padding:30px;color:var(--text3);font-size:12px;}
  .empty{text-align:center;padding:30px;color:var(--text3);font-size:12px;border:1px dashed var(--border);border-radius:var(--r);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;}
  .msg{font-size:12px;padding:8px 0;min-height:20px;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .rec-platform{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
  .rec-platform:last-child{border-bottom:none;}
  .rec-plat-icon{font-size:20px;}
  .rec-plat-info{flex:1;}
  .rec-plat-name{font-size:13px;color:var(--text);}
  .rec-plat-val{font-size:11px;color:var(--text3);}
</style>
</head>
<body>

<div class="header">

<script>

async function sbFetch(path,options={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...options,
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{})}
  });
  const text=await res.text();
  if(!text) return [];
  const parsed=JSON.parse(text);
  if(parsed && !Array.isArray(parsed) && parsed.code) throw new Error(parsed.message||'Supabase error');
  return Array.isArray(parsed)?parsed:[];
}

let lancamentos=[];

// ============================================================
// UTILS
// ============================================================
function fmt(v){return'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function fmtS(v){return(v>=0?'R$ ':'–R$ ')+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function hoje(){return new Date().toISOString().split('T')[0];}
function diaNum(data){return parseInt(data.split('-')[2]);}
function setSyncBadge(s){
  const b=document.getElementById('syncBadge');
  b.className='sync-badge';

// SUPABASE CRUD
// ============================================================
async function carregarDados(){
  setSyncBadge('load');
  try{
    const lancs = await sbFetch(`lancamentos?mes_ano=eq.${MES_ANO}&order=data.asc`).catch(()=>[]);
    const pags  = await sbFetch(`pagamentos?mes_ano=eq.${MES_ANO}`).catch(()=>[]);
    const recs  = await sbFetch(`receitas?mes_ano=eq.${MES_ANO}&order=data.asc`).catch(()=>[]);
    lancamentos = Array.isArray(lancs) ? lancs : [];
    pagamentos  = {};
    (Array.isArray(pags)?pags:[]).forEach(p=>{pagamentos[`${p.dia}-${p.descricao}`]=p.pago;});
    receitas    = Array.isArray(recs) ? recs : [];
    setSyncBadge('ok');
  }catch(e){
    console.error(e);setSyncBadge('err');
    lancamentos=JSON.parse(localStorage.getItem('tz_lanc')||'[]');
    pagamentos=JSON.parse(localStorage.getItem('tz_pag')||'{}');
    receitas=JSON.parse(localStorage.getItem('tz_rec')||'[]');
  }
  renderAll();
}

async function salvarLancamento(lanc){
  setSyncBadge('load');
  try{
    await sbFetch(`lancamentos`,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify({...lanc,mes_ano:MES_ANO})});
    setSyncBadge('ok');return true;
  }catch(e){setSyncBadge('err');return false;}
}

async function deletarLancamento(id){
  setSyncBadge('load');
  try{await sbFetch(`lancamentos?id=eq.${id}`,{method:'DELETE'});setSyncBadge('ok');return true;}
  catch(e){setSyncBadge('err');return false;}
}

async function salvarPagamento(dia,desc,pago){
  setSyncBadge('load');
  try{
    await sbFetch(`pagamentos`,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify({dia,descricao:desc,mes_ano:MES_ANO,pago,pago_em:pago?new Date().toISOString():null})});
    setSyncBadge('ok');
  }catch(e){setSyncBadge('err');}
}

async function salvarReceita(rec){
  setSyncBadge('load');
  try{
    // Tentar salvar no Supabase (tabela receitas pode não existir ainda)
    await sbFetch(`receitas`,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify({...rec,mes_ano:MES_ANO})});
    setSyncBadge('ok');return true;
  }catch(e){
    // Fallback local
    setSyncBadge('err');
    receitas.push({...rec,id:Date.now().toString(),mes_ano:MES_ANO});
    localStorage.setItem('tz_rec',JSON.stringify(receitas));
    return false;
  }
}

async function deletarReceita(id){
  receitas=receitas.filter(r=>r.id!==id);
  localStorage.setItem('tz_rec',JSON.stringify(receitas));
  try{await sbFetch(`receitas?id=eq.${id}`,{method:'DELETE'});}catch(e){}
  renderAll();
}

// ============================================================
// CALCULOS
// ============================================================
function calcTotais(){
  const fatVendas=lancamentos.reduce((a,l)=>a+(+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0),0);
  const fatPlat=receitas.reduce((a,r)=>a+(+r.valor||0),0);
  const totalFat=fatVendas+fatPlat;
  const totalReinvest=Math.round(fatVendas*REINVEST*100)/100; // reinvestimento só sobre vendas da loja
  const totalLiquido=fatVendas-totalReinvest;
  const totalDesp=getDespesas().reduce((a,d)=>a+d.val,0);
  const totalDespPagas=getDespesas().filter(d=>pagamentos[`${d.dia}-${d.desc}`]).reduce((a,d)=>a+d.val,0);
  const saldoAtual=SALDO_INI+totalLiquido+fatPlat-totalDespPagas;
  return{fatVendas,fatPlat,totalFat,totalReinvest,totalLiquido,totalDesp,totalDespPagas,saldoAtual};
}

function fatSemana(num){
  const sem=SEMANAS.find(s=>s.num===num);
  return lancamentos.filter(l=>sem.dias.includes(diaNum(l.data))).reduce((a,l)=>a+(+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0),0);
}

function fatHoje(){
  const l=lancamentos.find(x=>x.data===hoje());
  if(!l)return 0;
  return(+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0);
}

async function lancar(){
  const data=document.getElementById('inputData').value||hoje();
  const dinheiro=parseFloat(document.getElementById('inputDin').value)||0;
  const pix=parseFloat(document.getElementById('inputPix').value)||0;
  const debito=parseFloat(document.getElementById('inputDeb').value)||0;
  const credito=parseFloat(document.getElementById('inputCred').value)||0;
  if(dinheiro+pix+debito+credito<=0){showMsg('lancMsg','⚠️ Informe pelo menos um valor.','red');return;}
  const existente=lancamentos.find(l=>l.data===data);
  let lancamento;
  if(existente){
    lancamento={id:existente.id,data,dinheiro:(+existente.dinheiro||0)+dinheiro,pix:(+existente.pix||0)+pix,debito:(+existente.debito||0)+debito,credito:(+existente.credito||0)+credito,mes_ano:MES_ANO};
  }else{
    lancamento={data,dinheiro,pix,debito,credito,mes_ano:MES_ANO};
  }
  showMsg('lancMsg','⏳ Salvando...','yellow');
  const ok=await salvarLancamento(lancamento);
  if(ok){
    showMsg('lancMsg','✓ Salvo na nuvem!','green');
    await carregarDados();
    document.getElementById('inputDin').value='';
    document.getElementById('inputPix').value='';
    document.getElementById('inputDeb').value='';
    document.getElementById('inputCred').value='';
  }else{
    if(existente){existente.dinheiro=lancamento.dinheiro;existente.pix=lancamento.pix;existente.credito=lancamento.credito;}
    else{lancamentos.push({...lancamento,id:Date.now().toString()});}
    localStorage.setItem('tz_lanc',JSON.stringify(lancamentos));
    showMsg('lancMsg','⚠️ Salvo localmente','yellow');
    renderAll();
  }
}

function showMsg(id,txt,cor){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=txt;
  el.style.color=cor==='green'?'var(--green)':cor==='yellow'?'var(--yellow)':'var(--red)';
  if(cor==='green')setTimeout(()=>{if(el)el.textContent='';},3000);
}

function abrirEditLanc(id){
  const l=lancamentos.find(x=>x.id===id);
  if(!l)return;
  editLancId=id;
  const d=new Date(l.data+'T12:00:00');
  const label=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});
  document.getElementById('modalEditLancData').textContent='Editando: '+label;
  document.getElementById('editDin').value=+l.dinheiro||0;
  document.getElementById('editPix').value=+l.pix||0;
  document.getElementById('editDeb').value=+l.debito||0;
  document.getElementById('editCred').value=+l.credito||0;
  document.getElementById('editLancMsg').textContent='';
  document.getElementById('modalEditLanc').classList.add('open');
}

async function confirmarEditLanc(){
  if(!editLancId)return;
  const l=lancamentos.find(x=>x.id===editLancId);
  if(!l)return;
  const dinheiro=parseFloat(document.getElementById('editDin').value)||0;
  const pix=parseFloat(document.getElementById('editPix').value)||0;
  const debito=parseFloat(document.getElementById('editDeb').value)||0;
  const credito=parseFloat(document.getElementById('editCred').value)||0;
  if(dinheiro+pix+debito+credito<=0){showMsg('editLancMsg','⚠️ Informe pelo menos um valor.','red');return;}
  showMsg('editLancMsg','⏳ Salvando...','yellow');
  const lancamento={id:editLancId,data:l.data,dinheiro,pix,debito,credito,mes_ano:MES_ANO};
  const ok=await salvarLancamento(lancamento);
  if(ok){
    showMsg('editLancMsg','✓ Alteração salva!','green');
    await carregarDados();
    setTimeout(()=>{fecharModal('modalEditLanc');renderAll();},800);
  }else{
    // Atualizar local
    const idx=lancamentos.findIndex(x=>x.id===editLancId);
    if(idx>=0) lancamentos[idx]={...lancamentos[idx],dinheiro,pix,debito,credito};
    localStorage.setItem('tz_lanc',JSON.stringify(lancamentos));
    showMsg('editLancMsg','⚠️ Salvo localmente','yellow');
    setTimeout(()=>{fecharModal('modalEditLanc');renderAll();},800);
  }
  editLancId=null;
}

function abrirDelete(id,label){
  deleteId=id;
  document.getElementById('modalDeleteMsg').textContent=`Excluir lançamento de ${label}?`;
  document.getElementById('modalDelete').classList.add('open');

async function confirmarDelete(){

  fecharModal('modalDelete');
  await deletarLancamento(deleteId);
  lancamentos=lancamentos.filter(l=>l.id!==deleteId);
  deleteId=null;renderAll();
}

            <div class="desp-left">
              <div class="desp-name" style="${pago?'text-decoration:line-through;color:var(--text3);':''}">${d.desc}</div>
              <div class="desp-info">Dia ${d.dia===0?'variável':d.dia} · <span class="badge ${d.cat==='Loja'?'badge-blue':d.cat==='Variável'?'badge-purple':'badge-yellow'}">${d.cat}</span></div>

              <button class="check-btn ${pago?'pago':''}" onclick="togglePago(${d.dia},'${d.desc.replace(/'/g,"\\'")}')">✓</button>

    </div>`;
  });
  document.getElementById('page-semanas').innerHTML=html;

async function togglePago(dia,desc){
  const key=`${dia}-${desc}`;
  const novoVal=!pagamentos[key];
  pagamentos[key]=novoVal;
  localStorage.setItem('tz_pag',JSON.stringify(pagamentos));
  await salvarPagamento(dia,desc,novoVal);
  renderAll();
}

// ============================================================
// DESPESAS — GESTÃO
// ============================================================
function abrirModalDesp(){
  editDespIdx=null;
  document.getElementById('modalDespTitle').textContent='Nova Despesa';
  document.getElementById('despDesc').value='';
  document.getElementById('despVal').value='';
  document.getElementById('despDia').value='0';
  document.getElementById('despSem').value='1';
  document.getElementById('despCat').value='Variável';
  document.getElementById('despBtnSalvar').textContent='Salvar despesa';
  document.getElementById('modalDesp').classList.add('open');
}

function editarDesp(idx){
  const todas=getDespesas();
  const d=todas[idx];
  editDespIdx=idx;
  document.getElementById('modalDespTitle').textContent='Editar Despesa';
  document.getElementById('despDesc').value=d.desc;
  document.getElementById('despVal').value=d.val;
  document.getElementById('despDia').value=d.dia;
  document.getElementById('despSem').value=d.sem;
  document.getElementById('despCat').value=d.cat;
  document.getElementById('despBtnSalvar').textContent='Salvar alteração';
  document.getElementById('modalDesp').classList.add('open');
}

function salvarDesp(){
  const desc=document.getElementById('despDesc').value.trim();
  const val=parseFloat(document.getElementById('despVal').value)||0;
  const dia=parseInt(document.getElementById('despDia').value);
  const sem=parseInt(document.getElementById('despSem').value);
  const cat=document.getElementById('despCat').value;
  if(!desc||val<=0){showMsg('despMsg','⚠️ Preencha descrição e valor.','red');return;}

  if(editDespIdx!==null){
    const todas=getDespesas();
    const d=todas[editDespIdx];
    if(editDespIdx<DESPESAS_PADRAO.length){
      // Editar despesa padrão — salvar override em extra
      const existeIdx=despesasExtra.findIndex(x=>x.desc===d.desc&&x._override);
      const novo={...d,desc,val,dia,sem,cat,_override:true,_origDesc:d.desc};
      if(existeIdx>=0)despesasExtra[existeIdx]=novo;
      else despesasExtra.push(novo);
      // Marcar padrão como editado
      DESPESAS_PADRAO[editDespIdx]={...DESPESAS_PADRAO[editDespIdx],desc,val,dia,sem,cat};
    }else{
      const extraIdx=editDespIdx-DESPESAS_PADRAO.length;
      despesasExtra[extraIdx]={...despesasExtra[extraIdx],desc,val,dia,sem,cat};
    }
  }else{
    despesasExtra.push({desc,val,dia,sem,cat,editavel:true,_custom:true});
  }

  localStorage.setItem('tz_desp_extra',JSON.stringify(despesasExtra));
  showMsg('despMsg','✓ Salvo!','green');
  setTimeout(()=>{fecharModal('modalDesp');renderAll();},800);
}

function excluirDespExtra(extraIdx){
  if(confirm('Excluir esta despesa?')){
    despesasExtra.splice(extraIdx,1);
    localStorage.setItem('tz_desp_extra',JSON.stringify(despesasExtra));
    renderAll();
  }
}

// ============================================================
// MODAL
// ============================================================
function fecharModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',function(e){if(e.target===this)fecharModal(this.id);});
});

// ============================================================

// Criar tabela receitas no Supabase se não existir
async function initReceitas(){
  try{
    await sbFetch(`receitas?limit=1`);
  }catch(e){
    // Tabela não existe — usar apenas local
    receitas=JSON.parse(localStorage.getItem('tz_rec')||'[]');
  }
}

carregarDados();
