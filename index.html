<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>FluxoCerto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --green:#4ade80;--green2:#166534;--green-bg:rgba(74,222,128,0.08);
  --red:#f87171;--red2:#7f1d1d;--red-bg:rgba(248,113,113,0.08);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,0.08);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,0.08);
  --accent:#4ade80;--r:12px;--rsm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"DM Mono",monospace;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-logo{font-family:"Syne",sans-serif;font-size:32px;font-weight:800;color:var(--accent);margin-bottom:4px;}
.auth-tagline{font-size:12px;color:var(--text3);margin-bottom:40px;}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:380px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--rsm);padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-family:"Syne",sans-serif;font-weight:600;cursor:pointer;border-radius:6px;border:none;background:transparent;color:var(--text2);}
.auth-tab.active{background:var(--accent);color:#000;}
.auth-error{background:var(--red-bg);color:var(--red);border-left:3px solid var(--red);padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:12px;}
.auth-success{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green);padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:12px;}
.app{display:none;}
.app.visible{display:block;}
.header{background:var(--bg);padding:12px 16px 8px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.header-logo{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;color:var(--accent);}
.header-sub{font-size:10px;color:var(--text3);margin-top:2px;display:flex;justify-content:space-between;}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:20px;}
.sync-ok{background:var(--green-bg);color:var(--green);}
.sync-err{background:var(--red-bg);color:var(--red);}
.sync-load{background:var(--yellow-bg);color:var(--yellow);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:200;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-family:"DM Mono",monospace;font-size:8px;gap:3px;}
.nav-btn .icon{font-size:17px;}
.nav-btn.active{color:var(--accent);}
.page{display:none;padding:14px;padding-bottom:calc(80px + var(--safe-bottom));}
.page.active{display:block;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.card.green{border-color:var(--green2);background:var(--green-bg);}
.card.red{border-color:var(--red2);background:var(--red-bg);}
.card.yellow{border-color:#854d0e;background:var(--yellow-bg);}
.card.blue{border-color:#1e40af;background:var(--blue-bg);}
.card.purple{border-color:#5b21b6;background:var(--purple-bg);}
.card.full{grid-column:1/-1;}
.cl{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
.cv{font-family:"Syne",sans-serif;font-size:19px;font-weight:700;line-height:1;}
.cs{font-size:10px;color:var(--text3);margin-top:3px;}
.sec{font-family:"Syne",sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center;}
.pw{margin-bottom:10px;}
.pr{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px;}
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;transition:width 0.4s;}
.alert{padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:8px;border-left:3px solid;line-height:1.5;}
.alert-red{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.alert-yellow{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow);}
.alert-green{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.alert-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
.alert-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange);}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:11px 12px;color:var(--text);font-family:"DM Mono",monospace;font-size:15px;outline:none;width:100%;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text3);}
.field select option{background:var(--bg2);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{width:100%;padding:13px;border-radius:var(--rsm);border:none;cursor:pointer;font-family:"Syne",sans-serif;font-size:13px;font-weight:700;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-sm{padding:5px 10px;font-size:10px;width:auto;border-radius:6px;}
.btn-danger-sm{background:var(--red-bg);color:var(--red);border:1px solid var(--red2);}
.btn-yellow-sm{background:var(--yellow-bg);color:var(--yellow);border:1px solid #854d0e;}
.btn-green-sm{background:var(--green-bg);color:var(--green);border:1px solid var(--green2);}
.btn-blue-sm{background:var(--blue-bg);color:var(--blue);border:1px solid #1e40af;}
.li{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.li-info{display:flex;flex-direction:column;gap:2px;flex:1;margin-right:8px;}
.li-title{font-size:13px;color:var(--text);}
.li-sub{font-size:10px;color:var(--text3);}
.li-val{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;}
.badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;}
.bg-green{background:var(--green-bg);color:var(--green);}
.bg-red{background:var(--red-bg);color:var(--red);}
.bg-yellow{background:var(--yellow-bg);color:var(--yellow);}
.bg-blue{background:var(--blue-bg);color:var(--blue);}
.bg-purple{background:var(--purple-bg);color:var(--purple);}
.bg-orange{background:var(--orange-bg);color:var(--orange);}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.mo.open{opacity:1;pointer-events:all;}
.mo-body{background:var(--bg2);border-radius:20px 20px 0 0;padding:18px 16px calc(20px + var(--safe-bottom));width:100%;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);border-top:1px solid var(--border);max-height:92vh;overflow-y:auto;}
.mo.open .mo-body{transform:translateY(0);}
.mo-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.mo-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;}
.msg{font-size:12px;padding:5px 0;min-height:18px;}
.divider{height:1px;background:var(--border);margin:12px 0;}
.pdv-carrinho{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.pdv-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);}
.pdv-item:last-child{border-bottom:none;}
.pdv-item-info{flex:1;}
.pdv-item-nome{font-size:12px;color:var(--text);}
.pdv-item-preco{font-size:10px;color:var(--text3);}
.pdv-item-qtd{display:flex;align-items:center;gap:8px;margin:0 8px;}
.pdv-qtd-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pdv-item-sub{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--green);min-width:70px;text-align:right;}
.pdv-total{background:var(--bg3);padding:12px;display:flex;justify-content:space-between;align-items:center;}
.pdv-total-label{font-size:12px;color:var(--text3);}
.pdv-total-val{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:var(--green);}
.prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;}
.prod-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.prod-nome{font-size:13px;font-weight:500;color:var(--text);}
.prod-preco{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;color:var(--green);}
.prod-info{display:flex;gap:6px;flex-wrap:wrap;}
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.chart-title{font-family:"Syne",sans-serif;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;}
.chart-wrap{position:relative;width:100%;height:190px;}
.desp-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.desp-item:last-child{border-bottom:none;}
.di-left{display:flex;flex-direction:column;gap:2px;flex:1;margin-right:8px;}
.di-name{font-size:12px;}
.di-sub{font-size:10px;color:var(--text3);}
.di-right{display:flex;align-items:center;gap:6px;}
.check-btn{width:27px;height:27px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;transition:all 0.2s;}
.check-btn.pago{background:var(--green);border-color:var(--green);color:#000;}
.week-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.wh{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.wt{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;}
.wp{font-size:10px;color:var(--text3);margin-top:2px;}
.wf{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border);background:var(--bg3);}
.wfi{padding:8px;text-align:center;}
.wfl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:2px;}
.wfv{font-family:"Syne",sans-serif;font-size:12px;font-weight:700;}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:12px;border:1px dashed var(--border);border-radius:var(--r);}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-logo">FluxoCerto</div>
  <div class="auth-tagline">Gestao financeira para pequenos comerciantes</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login',this)">Entrar</button>
      <button class="auth-tab" onclick="authTab('cadastro',this)">Cadastrar</button>
    </div>
    <div id="authMsg"></div>
    <div id="formLogin">
      <div class="field"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@email.com" inputmode="email"></div>
      <div class="field"><label>Senha</label><input type="password" id="loginSenha" placeholder="........"></div>
      <button class="btn btn-primary" onclick="login()" style="margin-top:4px;">Entrar</button>
      <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:12px;cursor:pointer;" onclick="mostrarRecuperar()">Esqueceu a senha?</p>
    </div>
    <div id="formCadastro" style="display:none;">
      <div class="field"><label>Nome do comercio</label><input type="text" id="cadNomeComercio" placeholder="Ex: Topzera Papelaria"></div>
      <div class="field"><label>Seu nome</label><input type="text" id="cadNome" placeholder="Seu nome completo"></div>
      <div class="field"><label>E-mail</label><input type="email" id="cadEmail" placeholder="seu@email.com" inputmode="email"></div>
      <div class="field"><label>Senha (min. 8 caracteres)</label><input type="password" id="cadSenha" placeholder="........"></div>
      <div class="field"><label>Confirmar senha</label><input type="password" id="cadSenha2" placeholder="........"></div>
      <button class="btn btn-primary" onclick="cadastrar()" style="margin-top:4px;">Criar conta</button>
    </div>
    <div id="formRecuperar" style="display:none;">
      <p style="font-size:12px;color:var(--text2);margin-bottom:14px;">Informe seu e-mail para receber o link de redefinicao.</p>
      <div class="field"><label>E-mail</label><input type="email" id="recEmail" placeholder="seu@email.com"></div>
      <button class="btn btn-primary" onclick="recuperarSenha()" style="margin-top:4px;">Enviar link</button>
      <button class="btn btn-outline" onclick="authTab('login',null)" style="margin-top:8px;">Voltar</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-logo">FluxoCerto</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="sync-badge sync-load" id="syncBadge">...</div>
        <button class="btn btn-sm btn-danger-sm" onclick="logout()">Sair</button>
      </div>
    </div>
    <div class="header-sub">
      <span id="headerComercio">Carregando...</span>
      <span id="headerMes"></span>
    </div>
  </div>
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-pdv"></div>
  <div class="page" id="page-lancar"></div>
  <div class="page" id="page-graficos"></div>
  <div class="page" id="page-config"></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('dashboard',this)"><span class="icon">&#128202;</span>Dashboard</button>
    <button class="nav-btn" onclick="showPage('pdv',this)"><span class="icon">&#128722;</span>PDV</button>
    <button class="nav-btn" onclick="showPage('lancar',this)"><span class="icon">&#10133;</span>Lancar</button>
    <button class="nav-btn" onclick="showPage('graficos',this)"><span class="icon">&#128200;</span>Graficos</button>
    <button class="nav-btn" onclick="showPage('config',this)"><span class="icon">&#9881;</span>Gestao</button>
  </div>
</div>

<!-- MODAIS -->
<div class="mo" id="moProduto">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title" id="moProdutoTitle">Novo Produto</div>
    <div class="field"><label>Nome *</label><input type="text" id="pNome" placeholder="Ex: Caneta Azul BIC"></div>
    <div class="field-row">
      <div class="field"><label>Custo</label><input type="number" id="pCusto" placeholder="0.00" step="0.01" inputmode="decimal"></div>
      <div class="field"><label>Venda *</label><input type="number" id="pVenda" placeholder="0.00" step="0.01" inputmode="decimal"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Estoque</label><input type="number" id="pEstoque" placeholder="0" step="0.001" inputmode="decimal"></div>
      <div class="field"><label>Est. minimo</label><input type="number" id="pEstoqueMin" placeholder="5" step="0.001" inputmode="decimal"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Unidade</label>
        <select id="pUnidade"><option value="un">Unidade</option><option value="kg">kg</option><option value="g">g</option><option value="l">Litro</option><option value="cx">Caixa</option><option value="pc">Peca</option></select>
      </div>
      <div class="field"><label>Categoria</label><select id="pCategoria"><option value="">Sem categoria</option></select></div>
    </div>
    <div class="field"><label>Cod. barras</label><input type="text" id="pCodBarras" placeholder="EAN-13"></div>
    <div class="field"><label>Fornecedor</label><select id="pFornecedor"><option value="">Sem fornecedor</option></select></div>
    <div class="msg" id="msgProduto"></div>
    <button class="btn btn-primary" onclick="salvarProduto()" style="margin-bottom:8px;" id="btnSalvarProduto">Salvar</button>
    <button class="btn btn-outline" onclick="fecharMo('moProduto')">Cancelar</button>
  </div>
</div>
<div class="mo" id="moEstoque">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title">Ajustar Estoque</div>
    <div class="alert alert-blue" id="moEstoqueInfo" style="margin-bottom:12px;"></div>
    <div class="field"><label>Tipo</label><select id="eTipo"><option value="entrada">Entrada (compra)</option><option value="ajuste">Ajuste manual</option></select></div>
    <div class="field"><label>Quantidade</label><input type="number" id="eQtd" placeholder="0" step="0.001" inputmode="decimal"></div>
    <div class="field"><label>Motivo</label><input type="text" id="eMotivo" placeholder="Ex: Compra fornecedor..."></div>
    <div class="msg" id="msgEstoque"></div>
    <button class="btn btn-primary" onclick="salvarMovEstoque()" style="margin-bottom:8px;">Confirmar</button>
    <button class="btn btn-outline" onclick="fecharMo('moEstoque')">Cancelar</button>
  </div>
</div>
<div class="mo" id="moPdvPagamento">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title">Finalizar Venda</div>
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">Total</div>
      <div style="font-family:Syne,sans-serif;font-size:36px;font-weight:800;color:var(--green);" id="pdvTotalFinal">R$ 0,00</div>
    </div>
    <div class="field"><label>Desconto (R$)</label><input type="number" id="pdvDesconto" placeholder="0.00" step="0.01" inputmode="decimal" oninput="atualizarTotalFinal()"></div>
    <div class="field"><label>Forma de pagamento</label>
      <select id="pdvFormaPag">
        <option value="dinheiro">Dinheiro</option>
        <option value="pix">Pix</option>
        <option value="debito">Debito</option>
        <option value="credito">Credito</option>
        <option value="misto">Misto</option>
      </select>
    </div>
    <div class="field"><label>Observacao</label><input type="text" id="pdvObs" placeholder="Opcional"></div>
    <div class="msg" id="msgPdv"></div>
    <button class="btn btn-primary" onclick="finalizarVenda()" style="margin-bottom:8px;">Confirmar venda</button>
    <button class="btn btn-outline" onclick="fecharMo('moPdvPagamento')">Voltar</button>
  </div>
</div>
<div class="mo" id="moVendaDetalhe">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title">Detalhes da Venda</div>
    <div id="moVendaDetalheContent"></div>
    <button class="btn btn-outline" onclick="fecharMo('moVendaDetalhe')" style="margin-top:12px;">Fechar</button>
  </div>
</div>
<div class="mo" id="moConfig">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title" id="moConfigTitle">Configurar</div>
    <div id="moConfigContent"></div>
  </div>
</div>
<div class="mo" id="moSaida">
  <div class="mo-body">
    <div class="mo-handle"></div>
    <div class="mo-title">Registrar Saida</div>
    <div class="field"><label>Descricao</label><input type="text" id="sDesc" placeholder="Ex: Gasolina..."></div>
    <div class="field"><label>Valor (R$)</label><input type="number" id="sVal" placeholder="0.00" step="0.01" inputmode="decimal"></div>
    <div class="field"><label>Data</label><input type="date" id="sData"></div>

async function sbAuth(path, body) {
  try {
    const r = await fetch(SB + '/auth/v1/' + path, {method:'POST', headers:{'apikey':KEY,'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const t = await r.text();
    return t ? JSON.parse(t) : {};
  } catch(e) { return {error:{message:e.message}}; }
}

async function sb(path, opts) {
  opts = opts || {};
  const hdrs = {'apikey':KEY,'Content-Type':'application/json'};
  if (token) hdrs['Authorization'] = 'Bearer ' + token;
  Object.assign(hdrs, opts.headers || {});
  const r = await fetch(SB + '/rest/v1/' + path, Object.assign({}, opts, {headers:hdrs}));
  const t = await r.text();
  if (!t) return [];
  const p = JSON.parse(t);
  if (p && !Array.isArray(p) && p.code) throw new Error(p.message || 'Erro Supabase');
  return Array.isArray(p) ? p : p;
}

function getDespesas() {
  var ov = {};
  despesasExtra.forEach(function(d) { if (d._override && d._origDesc) ov[d._origDesc] = d; });
  var base = DESPESAS_PADRAO.map(function(d) { return ov[d.desc] ? Object.assign({}, ov[d.desc]) : d; });
  var todas = base.concat(despesasExtra.filter(function(d) { return !d._override; }));
  return todas.sort(function(a, b) {
    if (a.sem !== b.sem) return a.sem - b.sem;
    return (a.dia || 0) - (b.dia || 0);
  });
}

function fmt(v) { return 'R$ ' + Math.abs(+v || 0).toLocaleString('pt-BR', {minimumFractionDigits:2}); }

function calcTotais() {
  var fatVendas = lancamentos.reduce(function(a, l) { return a + (+l.dinheiro || 0) + (+l.pix || 0) + (+l.debito || 0) + (+l.credito || 0); }, 0);
  var fatPDV = vendas.reduce(function(a, v) { return a + (+v.total_final || 0); }, 0);
  var fatPlat = receitas.reduce(function(a, r) { return a + (+r.valor || 0); }, 0);
  var totalFat = fatVendas + fatPDV + fatPlat;
  var totalReinvest = Math.round((fatVendas + fatPDV) * REINVEST * 100) / 100;
  var totalLiquido = (fatVendas + fatPDV) - totalReinvest;
  var totalDespPagas = getDespesas().filter(function(d) { return pagamentos[d.dia + '-' + d.desc]; }).reduce(function(a, d) { return a + d.val; }, 0);
  var totalSaidas = saidas.reduce(function(a, s) { return a + (+s.valor || 0); }, 0);
  var saldoConta = saldoInicial.valor + totalLiquido + fatPlat - totalDespPagas - totalSaidas;
  var saldoTotal = saldoConta + caixaFixoAtual.valor;
  var metaMes = perfil.meta_mensal || 9500;
  return {fatVendas:fatVendas, fatPDV:fatPDV, fatPlat:fatPlat, totalFat:totalFat, totalReinvest:totalReinvest, totalLiquido:totalLiquido, totalDespPagas:totalDespPagas, totalSaidas:totalSaidas, saldoConta:saldoConta, saldoTotal:saldoTotal, metaMes:metaMes};
}

function fatHoje() {
  var h = hoje();
  var l = lancamentos.find(function(x) { return x.data === h; });
  var lf = l ? (+l.dinheiro || 0) + (+l.pix || 0) + (+l.debito || 0) + (+l.credito || 0) : 0;
  var vf = vendas.filter(function(v) { return v.data === h; }).reduce(function(a, v) { return a + (+v.total_final || 0); }, 0);
  return lf + vf;
}

function produtosEstoqueBaixo() {
  return produtos.filter(function(p) { return (+p.estoque_atual || 0) <= (+p.estoque_minimo || 0); });
}

function renderDashboard() {
  var t = calcTotais();
  var fh = fatHoje();
  var pctMes = Math.min((t.totalFat / t.metaMes) * 100, 100);
  var pctHoje = Math.min((fh / 365) * 100, 100);
  var baixo = produtosEstoqueBaixo();
  var diaAtual = parseInt(hoje().split('-')[2]);
  // Despesas atrasadas (dia < hoje, não pagas)
  var atrasadas = getDespesas().filter(function(d) { return d.dia > 0 && d.dia < diaAtual && !pagamentos[d.dia + '-' + d.desc]; });
  // Próximas despesas (dia >= hoje, não pagas, próximos 5 dias)
  var proximas5 = getDespesas().filter(function(d) { return d.dia >= diaAtual && d.dia <= diaAtual + 5 && !pagamentos[d.dia + '-' + d.desc]; });
  // Combinar: atrasadas primeiro, depois próximas, máximo 6
  var proximas = atrasadas.concat(proximas5).slice(0, 6);
  var alertas = '';
  if (t.saldoConta < 500) alertas += '<div class="alert alert-red">Saldo em conta abaixo de R$ 500.</div>';
  if (baixo.length > 0) alertas += '<div class="alert alert-orange">' + baixo.length + ' produto(s) com estoque baixo.</div>';
  var proxD = getDespesas().filter(function(d) { return d.dia > 0 && d.dia <= diaAtual + 3 && !pagamentos[d.dia + '-' + d.desc]; });
  if (proxD.length > 0) alertas += '<div class="alert alert-yellow">' + proxD.length + ' despesa(s) vencem em ate 3 dias - ' + fmt(proxD.reduce(function(a, d) { return a + d.val; }, 0)) + '</div>';
  if (t.totalFat >= t.metaMes) alertas += '<div class="alert alert-green">Meta do mes atingida!</div>';
  var resumoRows = [
    ['Vendas PDV', fmt(t.fatPDV), 'var(--green)'],
    ['Entradas manuais', fmt(t.fatVendas), 'var(--green)'],
    ['Receitas externas', fmt(t.fatPlat), 'var(--green)'],
    ['Reinvestimento', '- ' + fmt(t.totalReinvest), 'var(--yellow)'],
    ['Desp. pagas', '- ' + fmt(t.totalDespPagas), 'var(--red)'],
    ['Saidas', '- ' + fmt(t.totalSaidas), 'var(--red)'],
    ['Saldo conta', fmtS(t.saldoConta), t.saldoConta >= 0 ? 'var(--green)' : 'var(--red)']
  ];
  var resumoHtml = resumoRows.map(function(r, i) {
    return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:5px 0;' + (i > 0 ? 'border-top:1px solid var(--border)' : '') + (i >= 6 ? ';font-weight:600' : '') + '"><span style="color:var(--text3);">' + r[0] + '</span><span style="color:' + r[2] + ';">' + r[1] + '</span></div>';
  }).join('');
  var proximasHtml = proximas.map(function(d) {
    var atrasada = d.dia > 0 && d.dia < diaAtual;
    var labelDia = atrasada ? 'Dia ' + d.dia + ' - ATRASADA' : 'Dia ' + d.dia;
    var corSub = atrasada ? 'color:var(--red);font-weight:600;' : '';
    return '<div class="li"><div class="li-info"><div class="li-title">' + d.desc + '</div><div class="li-sub" style="' + corSub + '">' + labelDia + '</div></div><div style="text-align:right;"><div class="li-val" style="color:var(--red);">' + fmt(d.val) + '</div><button class="btn btn-sm btn-green-sm" style="margin-top:4px;" data-dia="' + d.dia + '" data-desc="' + d.desc + '" onclick="togglePagoBtn(this)">Pagar</button></div></div>';
  }).join('');
  document.getElementById('page-dashboard').innerHTML =
    '<div class="card-grid">' +
    '<div class="card ' + (t.saldoTotal >= 500 ? 'green' : t.saldoTotal >= 0 ? 'yellow' : 'red') + '"><div class="cl">Saldo total</div><div class="cv">' + fmtS(t.saldoTotal) + '</div><div class="cs">conta + caixa fixo</div></div>' +
    '<div class="card blue"><div class="cl">Faturamento</div><div class="cv">' + fmt(t.totalFat) + '</div><div class="cs">' + Math.round(pctMes) + '% da meta</div></div>' +
    '<div class="card yellow"><div class="cl">Reinvestir</div><div class="cv">' + fmt(t.totalReinvest) + '</div><div class="cs">35% das vendas</div></div>' +
    '<div class="card purple"><div class="cl">Caixa fixo</div><div class="cv">' + fmt(caixaFixoAtual.valor) + '</div><div class="cs"><button class="btn btn-sm btn-blue-sm" onclick="abrirConfigModal(&quot;caixaFixo&quot;)">Atualizar</button></div></div>' +
    '</div>' +
    alertas +
    '<div class="sec">Meta de hoje</div>' +
    '<div class="pw"><div class="pr"><span>' + fmt(fh) + '</span><span>Meta: R$ 365</span></div><div class="pb"><div class="pf" style="width:' + pctHoje + '%;background:' + (fh >= 365 ? 'var(--green)' : fh >= 200 ? 'var(--yellow)' : 'var(--red)') + ';"></div></div></div>' +
    '<div class="sec">Progresso do mes</div>' +
    '<div class="pw"><div class="pr"><span>' + fmt(t.totalFat) + '</span><span>Meta: ' + fmt(t.metaMes) + '</span></div><div class="pb"><div class="pf" style="width:' + pctMes + '%;background:var(--blue);"></div></div></div>' +
    '<div class="sec">Resumo financeiro</div>' +
    '<div class="card full" style="margin-bottom:10px;">' + resumoHtml + '</div>' +
    (baixo.length > 0 ? '<div class="sec">Estoque baixo</div>' + baixo.map(function(p) { return '<div class="li"><div class="li-info"><div class="li-title">' + p.nome + '</div><div class="li-sub">Atual: ' + p.estoque_atual + ' ' + p.unidade + '</div></div><span class="badge bg-red">Repor</span></div>'; }).join('') : '') +
    (proximas.length > 0 ? '<div class="sec">Proximas despesas</div>' + proximasHtml : '') +
    '<div class="sec">Acoes rapidas</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">' +

}

function renderPDV() {
  var totalCarrinho = carrinho.reduce(function(a, i) { return a + i.preco * i.qtd; }, 0);
  var carrinhoHtml = '';
  if (carrinho.length > 0) {
    carrinhoHtml = '<div class="sec">Carrinho</div><div class="pdv-carrinho">';
    carrinhoHtml += carrinho.map(function(item, idx) {
      return '<div class="pdv-item"><div class="pdv-item-info"><div class="pdv-item-nome">' + item.nome + '</div><div class="pdv-item-preco">' + fmt(item.preco) + ' / ' + item.unidade + '</div></div>' +
        '<div class="pdv-item-qtd"><button class="pdv-qtd-btn" onclick="alterarQtdCarrinho(' + idx + ',-1)">-</button><span style="font-size:13px;min-width:20px;text-align:center;">' + item.qtd + '</span><button class="pdv-qtd-btn" onclick="alterarQtdCarrinho(' + idx + ',1)">+</button></div>' +
        '<div class="pdv-item-sub">' + fmt(item.preco * item.qtd) + '</div></div>';
    }).join('');
    carrinhoHtml += '<div class="pdv-total"><span class="pdv-total-label">Total</span><span class="pdv-total-val">' + fmt(totalCarrinho) + '</span></div></div>';
    carrinhoHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;"><button class="btn btn-outline" onclick="limparCarrinho()">Limpar</button><button class="btn btn-primary" onclick="abrirPagamento()">Finalizar</button></div>';
  }
  var vendasHoje = vendas.filter(function(v) { return v.data === hoje(); });
  var vendasHtml = vendasHoje.length === 0 ? '<div class="empty">Nenhuma venda hoje.</div>' : vendasHoje.map(function(v) {
    return '<div class="li" onclick="verVenda(&quot;' + v.id + '&quot;)" style="cursor:pointer;"><div class="li-info"><div class="li-title">' + fmt(v.total_final) + '</div><div class="li-sub">' + new Date(v.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) + ' - ' + v.forma_pagamento + '</div></div><span class="badge bg-green">ok</span></div>';
  }).join('');
  document.getElementById('page-pdv').innerHTML =
    '<div class="sec">Frente de Caixa</div>' +
    '<div class="search-wrap"><span class="search-icon">buscar</span><input type="text" placeholder="Buscar produto..." id="pdvBusca" oninput="filtrarProdutosPDV()" style="padding-left:36px !important;"></div>' +
    '<div id="pdvProdutosGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;max-height:280px;overflow-y:auto;"></div>' +
    (carrinho.length === 0 ? '<div class="empty">Carrinho vazio. Selecione produtos acima.</div>' : '') +
    carrinhoHtml +
    '<div class="divider"></div>' +
    '<div class="sec">Vendas de hoje</div>' +
    vendasHtml;
  filtrarProdutosPDV();
}

function filtrarProdutosPDV() {
  var q = (document.getElementById('pdvBusca') ? document.getElementById('pdvBusca').value : '').toLowerCase();
  var filtrados = produtos.filter(function(p) { return !q || p.nome.toLowerCase().indexOf(q) >= 0 || (p.codigo_barras || '').indexOf(q) >= 0; });
  var grid = document.getElementById('pdvProdutosGrid');
  if (!grid) return;
  grid.innerHTML = filtrados.slice(0, 20).map(function(p) {
    var estoqueOk = (+p.estoque_atual || 0) > 0;
    return '<div class="prod-card" onclick="' + (estoqueOk ? 'addCarrinho(&quot;' + p.id + '&quot;)' : '') + '" style="' + (!estoqueOk ? 'opacity:0.5;cursor:not-allowed;' : '') + '">' +
      '<div class="prod-card-top"><div class="prod-nome">' + p.nome + '</div><div class="prod-preco">' + fmt(p.preco_venda) + '</div></div>' +
      '<div class="prod-info"><span class="badge ' + (estoqueOk ? 'bg-green' : 'bg-red') + '">' + (p.estoque_atual || 0) + ' ' + p.unidade + '</span></div></div>';
  }).join('') || '<div style="grid-column:1/-1;" class="empty">Nenhum produto.</div>';
}

function addCarrinho(prodId) {
  var p = produtos.find(function(x) { return x.id === prodId; });
  if (!p) return;
  var idx = carrinho.findIndex(function(i) { return i.prodId === prodId; });
  if (idx >= 0) { carrinho[idx].qtd++; }
  else { carrinho.push({prodId:prodId, nome:p.nome, preco:+p.preco_venda, unidade:p.unidade || 'un', qtd:1, custoUnit:+p.preco_custo || 0}); }
  renderPDV();
}

function alterarQtdCarrinho(idx, delta) {
  carrinho[idx].qtd += delta;
  if (carrinho[idx].qtd <= 0) carrinho.splice(idx, 1);
  renderPDV();
}

function limparCarrinho() {
  if (!confirm('Limpar carrinho?')) return;
  carrinho = []; renderPDV();
}

function abrirPagamento() {
  var total = carrinho.reduce(function(a, i) { return a + i.preco * i.qtd; }, 0);
  document.getElementById('pdvTotalFinal').textContent = fmt(total);
  document.getElementById('pdvDesconto').value = '';
  document.getElementById('pdvObs').value = '';
  document.getElementById('msgPdv').textContent = '';
  document.getElementById('moPdvPagamento').classList.add('open');
}

function atualizarTotalFinal() {
  var total = carrinho.reduce(function(a, i) { return a + i.preco * i.qtd; }, 0);
  var desc = parseFloat(document.getElementById('pdvDesconto').value) || 0;
  document.getElementById('pdvTotalFinal').textContent = fmt(Math.max(0, total - desc));
}

async function finalizarVenda() {
  var total = carrinho.reduce(function(a, i) { return a + i.preco * i.qtd; }, 0);
  var desc = parseFloat(document.getElementById('pdvDesconto').value) || 0;
  var totalFinal = Math.max(0, total - desc);
  var forma = document.getElementById('pdvFormaPag').value;
  var obs = document.getElementById('pdvObs').value.trim();
  showMsg('msgPdv', 'Registrando...', 'warn');
  try {
    var vendaRes = await sb('vendas', {method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify({user_id:userId, data:hoje(), mes_ano:MES_ANO, total:total, desconto:desc, total_final:totalFinal, forma_pagamento:forma, obs:obs, status:'concluida'})});
    var venda = Array.isArray(vendaRes) ? vendaRes[0] : vendaRes;
    for (var i = 0; i < carrinho.length; i++) {
      var item = carrinho[i];
      await sb('venda_itens', {method:'POST', body:JSON.stringify({venda_id:venda.id, produto_id:item.prodId, user_id:userId, nome_produto:item.nome, quantidade:item.qtd, preco_unitario:item.preco, preco_custo:item.custoUnit, subtotal:item.preco * item.qtd})});
      var prod = produtos.find(function(p) { return p.id === item.prodId; });
      if (prod) {
        var novoEst = (+prod.estoque_atual || 0) - item.qtd;
        await sb('produtos?id=eq.' + item.prodId, {method:'PATCH', body:JSON.stringify({estoque_atual:novoEst, updated_at:new Date().toISOString()})});
        prod.estoque_atual = novoEst;
      }
    }
    vendas.unshift(venda);
    showMsg('msgPdv', 'Venda registrada!', 'ok');
    setTimeout(function() { fecharMo('moPdvPagamento'); carrinho = []; renderAll(); }, 800);
  } catch(e) { showMsg('msgPdv', 'Erro: ' + e.message, 'err'); }
}

async function verVenda(id) {
  try {
    var itens = await sb('venda_itens?venda_id=eq.' + id + '&order=created_at.asc');
    var v = vendas.find(function(x) { return x.id === id; });
    var html = '<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--text3);">' + v.data + ' - ' + v.forma_pagamento + '</div></div>';
    html += itens.map(function(i) { return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;"><div><div>' + i.nome_produto + '</div><div style="font-size:10px;color:var(--text3);">' + i.quantidade + 'x ' + fmt(i.preco_unitario) + '</div></div><div style="color:var(--green);">' + fmt(i.subtotal) + '</div></div>'; }).join('');
    html += '<div style="display:flex;justify-content:space-between;padding:10px 0;font-size:14px;font-weight:600;"><span>Total</span><span style="color:var(--green);">' + fmt(v.total_final) + '</span></div>';
    document.getElementById('moVendaDetalheContent').innerHTML = html;
    document.getElementById('moVendaDetalhe').classList.add('open');
  } catch(e) {}
}

function buildCharts() {
  Object.values(charts).forEach(function(c) { try { c.destroy(); } catch(e) {} });
  charts = {};
  var co = {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:9}, color:'#555'}, grid:{display:false}}, y:{ticks:{font:{size:9}, color:'#555', callback:function(v) { return 'R$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v); }}, grid:{color:'rgba(255,255,255,0.04)'}}}};
  var diaAtual = parseInt(hoje().split('-')[2]);
  var diasL = [], fatL = [];
  for (var d = 1; d <= diaAtual; d++) {
    var ds = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var l = lancamentos.find(function(x) { return x.data === ds; });
    var lf = l ? (+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0) : 0;
    var vf = vendas.filter(function(v) { return v.data === ds; }).reduce(function(a,v) { return a+(+v.total_final||0); }, 0);
    diasL.push('D' + d); fatL.push(lf + vf);
  }
  charts.diario = new Chart(document.getElementById('cDiario'), {type:'bar', data:{labels:diasL, datasets:[{data:fatL, backgroundColor:fatL.map(function(v) { return v>=365?'rgba(74,222,128,0.7)':'rgba(96,165,250,0.5)'; }), borderRadius:4}]}, options:Object.assign({}, co, {plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(ctx) { return fmt(ctx.raw); }}}}})});
  var fSems = SEMANAS.map(function(s) {
    var lf = lancamentos.filter(function(l) { return s.dias.indexOf(diaNum(l.data)) >= 0; }).reduce(function(a,l) { return a+(+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0); }, 0);
    var vf = vendas.filter(function(v) { return s.dias.indexOf(diaNum(v.data)) >= 0; }).reduce(function(a,v) { return a+(+v.total_final||0); }, 0);
    return lf + vf;
  });
  var dSems = SEMANAS.map(function(s) { return getDespesas().filter(function(d) { return d.sem === s.num; }).reduce(function(a,d) { return a+d.val; }, 0); });
  charts.semanas = new Chart(document.getElementById('cSemanas'), {type:'bar', data:{labels:['Sem 1','Sem 2','Sem 3','Sem 4'], datasets:[{label:'Faturado', data:fSems, backgroundColor:'rgba(74,222,128,0.6)', borderRadius:4}, {label:'Despesas', data:dSems, backgroundColor:'rgba(248,113,113,0.6)', borderRadius:4}]}, options:Object.assign({}, co, {plugins:{legend:{display:true, labels:{color:'#999', font:{size:10}}}, tooltip:{callbacks:{label:function(ctx) { return ctx.dataset.label + ': ' + fmt(ctx.raw); }}}}})});
  var tD = lancamentos.reduce(function(a,l) { return a+(+l.dinheiro||0); }, 0);
  var tP = lancamentos.reduce(function(a,l) { return a+(+l.pix||0); }, 0);
  var tDeb = lancamentos.reduce(function(a,l) { return a+(+l.debito||0); }, 0);
  var tC = lancamentos.reduce(function(a,l) { return a+(+l.credito||0); }, 0);
  charts.pag = new Chart(document.getElementById('cPag'), {type:'doughnut', data:{labels:['Dinheiro','Pix','Debito','Credito'], datasets:[{data:[tD,tP,tDeb,tC], backgroundColor:['rgba(251,191,36,0.8)','rgba(74,222,128,0.8)','rgba(96,165,250,0.8)','rgba(167,139,250,0.8)'], borderWidth:0}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{color:'#999', font:{size:10}, boxWidth:12}}, tooltip:{callbacks:{label:function(ctx) { return ctx.label + ': ' + fmt(ctx.raw); }}}}}});
  var se = saldoInicial.valor, sl = ['Inicio'], sd = [se];
  var evs = [];
  lancamentos.forEach(function(l) { var f=(+l.dinheiro||0)+(+l.pix||0)+(+l.debito||0)+(+l.credito||0); evs.push({data:l.data, d:f-Math.round(f*REINVEST*100)/100}); });
  vendas.forEach(function(v) { var f=+v.total_final||0; evs.push({data:v.data, d:f-Math.round(f*REINVEST*100)/100}); });
  saidas.forEach(function(s) { evs.push({data:s.data, d:-(+s.valor||0)}); });
  evs.sort(function(a,b) { return a.data.localeCompare(b.data); });
  evs.forEach(function(e) { se+=e.d; sl.push('D'+diaNum(e.data)); sd.push(Math.round(se*100)/100); });
  charts.saldo = new Chart(document.getElementById('cSaldo'), {type:'line', data:{labels:sl, datasets:[{data:sd, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.06)', fill:true, tension:0.3, pointRadius:2, pointBackgroundColor:sd.map(function(v) { return v>=0?'#60a5fa':'#f87171'; })}, {data:Array(sl.length).fill(0), borderColor:'rgba(248,113,113,0.3)', borderDash:[4,3], pointRadius:0, fill:false}]}, options:Object.assign({}, co, {plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(ctx) { return fmtS(ctx.raw); }}}}})}); 
  var fa = [10987.63, 8562.44, 13376.23, 8450.11, 10677.38, calcTotais().totalFat, 0, 0, 0, 0, 0, 0];
  var mi = new Date().getMonth();
  charts.anual = new Chart(document.getElementById('cAnual'), {type:'bar', data:{labels:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'], datasets:[{data:fa, backgroundColor:fa.map(function(v,i) { return i===mi?'rgba(74,222,128,0.8)':i<mi?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.06)'; }), borderRadius:4}, {label:'Meta', data:Array(12).fill(perfil.meta_mensal||9500), type:'line', borderColor:'rgba(251,191,36,0.5)', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false}]}, options:Object.assign({}, co, {plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(ctx) { return fmt(ctx.raw); }}}}})});
}

function renderListaProdutosHtml() {
  if (produtos.length === 0) return '<div class="empty" style="margin-bottom:10px;">Nenhum produto. Clique em + Novo para adicionar.</div>';
  return produtos.slice(0, 10).map(function(p) {
    var m = p.preco_custo > 0 ? Math.round((1 - p.preco_custo / p.preco_venda) * 100) : null;
    var estoqueOk = (+p.estoque_atual || 0) > (+p.estoque_minimo || 0);
    return '<div class="prod-card">' +
      '<div class="prod-card-top"><div><div class="prod-nome">' + p.nome + '</div></div><div style="text-align:right;"><div class="prod-preco">' + fmt(p.preco_venda) + '</div>' + (p.preco_custo > 0 ? '<div style="font-size:10px;color:var(--text3);">custo: ' + fmt(p.preco_custo) + '</div>' : '') + '</div></div>' +
      '<div class="prod-info"><span class="badge ' + (estoqueOk ? 'bg-green' : 'bg-red') + '">' + (p.estoque_atual || 0) + ' ' + p.unidade + '</span>' + (m !== null ? '<span class="badge ' + (m >= 40 ? 'bg-green' : m >= 20 ? 'bg-yellow' : 'bg-red') + '">Margem ' + m + '%</span>' : '') + '</div>' +
      '<div style="display:flex;gap:6px;margin-top:10px;">' +
        '<button class="btn btn-sm btn-yellow-sm" onclick="editarProduto(&quot;' + p.id + '&quot;)">Editar</button>' +
        '<button class="btn btn-sm btn-blue-sm" onclick="abrirAjusteEstoque(&quot;' + p.id + '&quot;)">Estoque</button>' +
        '<button class="btn btn-sm btn-danger-sm" onclick="desativarProduto(&quot;' + p.id + '&quot;)">Desativar</button>' +
      '</div></div>';
  }).join('');
}

async function salvarProduto() {
  var nome = document.getElementById('pNome').value.trim();
  var custo = parseFloat(document.getElementById('pCusto').value) || 0;
  var venda = parseFloat(document.getElementById('pVenda').value) || 0;
  var estoque = parseFloat(document.getElementById('pEstoque').value) || 0;
  var estoqueMin = parseFloat(document.getElementById('pEstoqueMin').value) || 5;
  var unidade = document.getElementById('pUnidade').value;
  var codBarras = document.getElementById('pCodBarras').value.trim();
  var catId = document.getElementById('pCategoria').value || null;
  var fornId = document.getElementById('pFornecedor').value || null;
  if (!nome || venda <= 0) { showMsg('msgProduto', 'Preencha nome e preco de venda.', 'err'); return; }
  showMsg('msgProduto', 'Salvando...', 'warn');
  var dados = {user_id:userId, nome:nome, preco_custo:custo, preco_venda:venda, estoque_atual:estoque, estoque_minimo:estoqueMin, unidade:unidade, codigo_barras:codBarras, categoria_id:catId, fornecedor_id:fornId, updated_at:new Date().toISOString()};
  try {
    if (editProdId) {
      await sb('produtos?id=eq.' + editProdId, {method:'PATCH', body:JSON.stringify(dados)});
      var idx = produtos.findIndex(function(p) { return p.id === editProdId; });
      if (idx >= 0) produtos[idx] = Object.assign({}, produtos[idx], dados);
    } else {
      var res = await sb('produtos', {method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify(Object.assign({}, dados, {ativo:true}))});
      if (Array.isArray(res) && res[0]) produtos.push(res[0]);
    }
    showMsg('msgProduto', 'Salvo!', 'ok');
    setTimeout(function() { fecharMo('moProduto'); renderAll(); }, 700);
  } catch(e) { showMsg('msgProduto', 'Erro: ' + e.message, 'err'); }
}

async function desativarProduto(id) {
  if (!confirm('Desativar este produto?')) return;
  await sb('produtos?id=eq.' + id, {method:'PATCH', body:JSON.stringify({ativo:false})});
  produtos = produtos.filter(function(p) { return p.id !== id; });
  renderAll();
}

function abrirAjusteEstoque(id) {
  var p = produtos.find(function(x) { return x.id === id; });
  if (!p) return;
  ajusteEstoqueProdId = id;
  document.getElementById('moEstoqueInfo').textContent = p.nome + ' - Estoque atual: ' + (p.estoque_atual || 0) + ' ' + p.unidade;
  document.getElementById('eTipo').value = 'entrada';
  document.getElementById('eQtd').value = '';
  document.getElementById('eMotivo').value = '';
  document.getElementById('msgEstoque').textContent = '';
  document.getElementById('moEstoque').classList.add('open');
}

async function salvarMovEstoque() {
  var p = produtos.find(function(x) { return x.id === ajusteEstoqueProdId; });
  if (!p) return;
  var tipo = document.getElementById('eTipo').value;
  var qtd = parseFloat(document.getElementById('eQtd').value) || 0;
  var motivo = document.getElementById('eMotivo').value.trim();
  if (qtd <= 0) { showMsg('msgEstoque', 'Informe a quantidade.', 'err'); return; }
  var estAtual = +p.estoque_atual || 0;
  var estNovo = tipo === 'entrada' ? estAtual + qtd : qtd;
  showMsg('msgEstoque', 'Salvando...', 'warn');
  try {
    await sb('produtos?id=eq.' + ajusteEstoqueProdId, {method:'PATCH', body:JSON.stringify({estoque_atual:estNovo, updated_at:new Date().toISOString()})});
    await sb('estoque_movimentos', {method:'POST', body:JSON.stringify({user_id:userId, produto_id:ajusteEstoqueProdId, tipo:tipo, quantidade:qtd, estoque_anterior:estAtual, estoque_posterior:estNovo, motivo:motivo})});
    p.estoque_atual = estNovo;
    showMsg('msgEstoque', 'Estoque atualizado!', 'ok');
    setTimeout(function() { fecharMo('moEstoque'); renderAll(); }, 700);
  } catch(e) { showMsg('msgEstoque', 'Erro: ' + e.message, 'err'); }
}

  showMsg('lancMsg', 'Salvando...', 'warn');
  try {
    await sb('lancamentos', {method:'POST', headers:{'Prefer':'resolution=merge-duplicates,return=representation'}, body:JSON.stringify(lanc)});

  if (!nome) { showMsg('fornMsg', 'Informe o nome.', 'err'); return; }
  try {
    var res = await sb('fornecedores', {method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify({nome:nome, telefone:tel, email:email, user_id:userId})});
    if (Array.isArray(res) && res[0]) fornecedores.push(res[0]);
    showMsg('fornMsg', 'Salvo!', 'ok');
    setTimeout(function() { fecharMo('moConfig'); renderAll(); }, 700);
  } catch(e) { showMsg('fornMsg', 'Erro: ' + e.message, 'err'); }
}

async function excluirFornecedor(id) {
  if (!confirm('Excluir fornecedor?')) return;
  await sb('fornecedores?id=eq.' + id, {method:'DELETE'});
  fornecedores = fornecedores.filter(function(f) { return f.id !== id; });
  renderAll();
}

function salvarDesp(idx) {
  var desc = document.getElementById('dDesc').value.trim();
  var val = parseFloat(document.getElementById('dVal').value) || 0;
  var dia = parseInt(document.getElementById('dDia').value) || 0;
  var sem = parseInt(document.getElementById('dSem').value) || 1;
  var cat = document.getElementById('dCat').value;
  if (!desc || val <= 0) { showMsg('dMsg', 'Preencha descricao e valor.', 'err'); return; }
  despesasExtra = JSON.parse(localStorage.getItem('fc_desp_' + userId) || '[]');
  if (idx !== null && idx !== undefined && idx < DESPESAS_PADRAO.length) {
    var origDesc = DESPESAS_PADRAO[idx].desc;
    var ei = despesasExtra.findIndex(function(x) { return x._override && x._origDesc === origDesc; });
    var novo = {desc:desc, val:val, dia:dia, sem:sem, cat:cat, _override:true, _origDesc:origDesc, editavel:true};
    if (ei >= 0) despesasExtra[ei] = novo; else despesasExtra.push(novo);
    DESPESAS_PADRAO[idx] = Object.assign({}, DESPESAS_PADRAO[idx], {desc:desc, val:val, dia:dia, sem:sem, cat:cat});
  } else if (idx !== null && idx !== undefined) {
    var customs = despesasExtra.filter(function(d) { return !d._override; });
    var ei2 = despesasExtra.indexOf(customs[idx - DESPESAS_PADRAO.length]);
    if (ei2 >= 0) despesasExtra[ei2] = Object.assign({}, despesasExtra[ei2], {desc:desc, val:val, dia:dia, sem:sem, cat:cat});
  } else {
    despesasExtra.push({desc:desc, val:val, dia:dia, sem:sem, cat:cat, editavel:true, _custom:true});
  }
  localStorage.setItem('fc_desp_' + userId, JSON.stringify(despesasExtra));
  showMsg('dMsg', 'Salvo!', 'ok');
  setTimeout(function() { fecharMo('moConfig'); renderAll(); }, 700);
}

function fecharMo(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.mo').forEach(function(m) { m.addEventListener('click', function(e) { if (e.target === this) fecharMo(this.id); }); });

(async function() {
  var savedToken = localStorage.getItem('fc_token');
  if (savedToken) {
    try {
      var r = await fetch(SB + '/auth/v1/user', {headers:{'apikey':KEY, 'Authorization':'Bearer ' + savedToken}});
      if (r.ok) {
        var user = await r.json();
        if (user && user.id) { token = savedToken; userId = user.id; await iniciarSessao(savedToken, user); return; }
      }
    } catch(e) {}
    localStorage.removeItem('fc_token'); localStorage.removeItem('fc_user');
  }
  document.getElementById('authScreen').style.display = 'flex';
})();
</script>
